server:
  port: 8086

spring:
  application:
    name: shop_attrangs
  datasource:
    url: jdbc:postgresql://localhost:5432/shop_attrangs
    username: postgres
    password: 1004
    driver-class-name: org.postgresql.Driver
    hikari:
      connection-timeout: 5000
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 20MB

file:
  upload-dir: uploads